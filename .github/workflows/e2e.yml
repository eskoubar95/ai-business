# Unit tests + production build gates, Playwright when secrets exist.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Lockfile from Windows can omit Rollup's Linux optional binary; Vitest/Vite needs it on ubuntu-latest.
      - name: Ensure Rollup Linux native module
        run: |
          RVER=$(node -p "require('rollup/package.json').version")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${RVER}"

      - name: Vitest (unit / integration)
        run: npm test -- --run

      - name: ESLint (next lint)
        run: npm run lint

      - name: Next.js production build
        env:
          CI: true
        run: npm run build

  playwright:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Same optional-dep fix as quality job — Next.dev + layout must resolve Rollup on Linux.
      - name: Ensure Rollup Linux native module
        run: |
          RVER=$(node -p "require('rollup/package.json').version")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${RVER}"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # Keep CI schema in sync with `db/schema.ts` — E2E hits real Neon; migrations are not implicit.
      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: npm run db:migrate

      - name: Run Playwright tests
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
          NEON_AUTH_COOKIE_SECRET: ${{ secrets.NEON_AUTH_COOKIE_SECRET }}
          # MCP credential encryption (required for agents E2E when installing GitHub MCP on an agent).
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          # Optional: enables `tests/approvals.spec.ts`; if unset that spec stays skipped.
          E2E_SETUP_SECRET: ${{ secrets.E2E_SETUP_SECRET }}
          GRILL_ME_E2E_MOCK: "1"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
